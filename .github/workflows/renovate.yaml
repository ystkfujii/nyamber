name: Renovate

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate via docker
        run: |
          docker run --rm \
            -e RENOVATE_PLATFORM=github \
            -e RENOVATE_TOKEN="${{ secrets.RENOVATE_TOKEN }}" \
            -e RENOVATE_REPOSITORIES="${{ github.repository }}" \
            -e LOG_LEVEL=debug \
            -v "${{ github.workspace }}/.github/renovate.json5:/usr/src/app/config.js5:ro" \
            ghcr.io/renovatebot/renovate:latest
